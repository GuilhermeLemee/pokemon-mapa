name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
  push:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    working-directory: infra

jobs:
  # Só valida sintaxe/formatação — não requer nenhuma credencial de nuvem.
  #
  # `terraform apply` provisiona IAM, service accounts e APIs do projeto,
  # o que exigiria dar à service account de CI permissões quase equivalentes
  # a Owner. Preferimos manter esse poder só na sua conta local (você já
  # rodou o primeiro apply manualmente — ver infra/README.md) em vez de
  # colocá-lo num robô de CI. Mudanças de infraestrutura continuam sendo
  # aplicadas localmente, deliberadamente, por quem administra o projeto.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init -backend=false

      - run: terraform validate

      - run: terraform fmt -check -recursive
